<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>openmaterials.ai &mdash; map lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#05070e;color:#e6ecf7;}
  .bar{height:52px;display:flex;align-items:center;gap:6px;padding:0 16px;background:rgba(8,11,19,.9);border-bottom:1px solid #161e30;position:relative;z-index:2;}
  .bar .mark{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#7c93ff,#38e0b0);box-shadow:0 0 14px rgba(124,147,255,.5);}
  .bar .brand{font-weight:800;letter-spacing:-.02em;margin-right:14px;}
  .bar .brand b{color:#7c93ff;}
  .tabs{display:flex;gap:4px;}
  .tab{border:1px solid transparent;background:none;color:#8694ad;font:600 .86rem 'Inter';padding:7px 14px;border-radius:9px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:flex-start;line-height:1.15;}
  .tab small{font-weight:500;font-size:.64rem;color:#5b6b86;letter-spacing:.02em;}
  .tab:hover{color:#e6ecf7;background:#0e1626;}
  .tab.on{color:#fff;background:#141d31;border-color:#27324d;}
  .tab.on small{color:#9fb0d6;}
  .stage{position:absolute;top:52px;left:0;right:0;bottom:0;}
  iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#05070e;display:none;}
  iframe.on{display:block;}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#46536e;font-size:.9rem;}
</style>
</head>
<body>
<div class="bar">
  <span class="mark"></span><span class="brand">openmaterials<b>.ai</b> &nbsp;map lab</span>
  <div class="tabs" id="tabs"></div>
</div>
<div class="stage" id="stage"><div class="loading" id="loading">pick a view</div></div>
<script>
  var VIEWS=[
    {key:'tracer', label:'Tracer', sub:'follow a derivation', src:'../map-trace/'},
    {key:'orbit', label:'Orbit', sub:'observable as the sun', src:'orbit.html'},
    {key:'strata', label:'Strata', sub:'the assembly line', src:'strata.html'},
    {key:'constellation', label:'Constellation', sub:'cross-code star map', src:'constellation.html'},
    {key:'rivers', label:'Rivers', sub:'two tributaries to kappa', src:'rivers.html'}
  ];
  var tabs=document.getElementById('tabs'), stage=document.getElementById('stage'), loading=document.getElementById('loading');
  var frames={};
  function show(key){
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('on', t.dataset.key===key); });
    if(loading) loading.style.display='none';
    if(!frames[key]){
      var v=VIEWS.find(function(x){return x.key===key;});
      var f=document.createElement('iframe'); f.src=v.src; f.dataset.key=key; stage.appendChild(f); frames[key]=f;
    }
    Object.keys(frames).forEach(function(k){ frames[k].classList.toggle('on', k===key); });
    location.hash=key;
  }
  VIEWS.forEach(function(v){
    var b=document.createElement('button'); b.className='tab'; b.dataset.key=v.key;
    b.innerHTML=v.label+'<small>'+v.sub+'</small>'; b.onclick=function(){ show(v.key); };
    tabs.appendChild(b);
  });
  var start=(location.hash||'').replace('#','');
  show(VIEWS.some(function(v){return v.key===start;})?start:'tracer');
</script>
</body>
</html>
