<html lang="en">
<head>

<style>
  /* The map consumes the shared component library (site.css): buttons, the
     search input, the code-rail chips, the floating panel, its section labels,
     and the provenance kv rows are all .om-* classes now. This block keeps only
     the map's page-specific layout (the warm-paper canvas, tier bands, the SVG
     edge/node encoding, the fallback). The semantic node colors are
     load-bearing and unchanged; the canvas is warmed to the site's paper. */
  :root{--ink:#16181d;--ink2:#3d4149;--muted:#6b7078;--faint:#9aa0a8;--line:#e8e6e1;
        --obs:#4f46e5;--obs2:#4338ca;--hidbd:#dde4ee;--gold:#d98a14;--green:#0f9d6b;
        --band:#f4f2ee;--bandln:#e3ded5;--bandtx:#16181d;
        --surface:#ffffff;--accent-soft:#eef2ff;
        --font-serif:'Source Serif 4',Georgia,'Times New Roman',serif;
        --font-sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        --font-mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
        /* the map's own layout radius (larger than the prose scale) */
        --r-3:16px;
        --shadow-1:0 1px 2px rgba(22,24,29,.06);--shadow-2:0 8px 30px rgba(22,24,29,.08);}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
  #err{position:fixed;top:0;left:0;right:0;background:#7f1d1d;color:#fff;font:13px/1.4 monospace;padding:8px 12px;z-index:60;display:none;white-space:pre-wrap;}
  .top{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;gap:13px;padding:0 clamp(14px,3vw,22px);background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:20;}
  .top .brand{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-serif);font-weight:700;font-size:1.06rem;letter-spacing:-.01em;white-space:nowrap;color:var(--ink);text-decoration:none;}
  .top .brand .om-dot{width:6px;height:6px;border-radius:50%;background:var(--obs);flex:none;display:inline-block;margin-bottom:.28em;}
  .top .sub{color:var(--faint);font-size:.82rem;font-weight:500;white-space:nowrap;}
  /* search + controls sizing is page-specific; the field itself is .om-input,
     the buttons are .om-btn .om-btn-sm (see markup) */
  .top .om-search{margin-left:16px;flex:1;max-width:320px;}
  .top .nav{display:flex;align-items:center;gap:16px;margin-left:6px;}
  .top .nav a{font-family:'Inter',sans-serif;color:var(--ink2);font-size:.86rem;font-weight:500;white-space:nowrap;text-decoration:none;padding:6px 0;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
  .top .nav a:hover{color:var(--ink);}
  .top .nav a.active{color:var(--ink);border-bottom-color:var(--obs);}
  .top .nav .ext::after{content:"\2197";font-size:.7em;vertical-align:super;opacity:.55;margin-left:1px;}
  .top .controls{margin-left:auto;display:flex;gap:9px;align-items:center;}
  /* warm-paper canvas: same dotted grid pitch (26px) and the same rhythm as
     before; only the temperature changes (cool blue-white -> warm paper). */
  #cy{position:fixed;top:60px;left:0;right:0;bottom:0;
      background:radial-gradient(circle at 1px 1px,#e6e3dd 1px,transparent 0) -1px -1px/26px 26px,
                 linear-gradient(180deg,#fdfcfa,#f6f4f0);}
  svg{width:100%;height:100%;display:block;cursor:grab;touch-action:none;} svg.drag{cursor:grabbing;}
  /* tier bands (warm paper: fill and rule warmed, headings ink, descriptions
     muted; the band opacity/rhythm are unchanged) */
  .band rect{fill:var(--band);opacity:.55;}
  .band .bl{stroke:var(--bandln);stroke-width:1;stroke-dasharray:2 5;opacity:.9;}
  .band .h{font-family:var(--font-serif);font-weight:600;fill:var(--bandtx);letter-spacing:-.005em;}
  .band .sh{fill:var(--muted);font-weight:500;}   /* descriptions stay Inter */
  .band .ord{fill:var(--faint);font-weight:800;}
  /* edges: warm-gray so they sit on the paper canvas (semantic hot stays indigo) */
  .edge{fill:none;stroke:#d6d2cb;stroke-width:1.5;stroke-linecap:round;transition:opacity .15s,stroke .15s;}
  .edge.param{stroke:#ddd9d1;stroke-width:1;stroke-dasharray:3 3;opacity:.42;}
  .edge.hot{stroke:var(--obs);stroke-width:2.4;}
  /* nodes */
  .node rect{stroke-width:1.6;filter:drop-shadow(0 2px 6px rgba(16,24,40,.10));transition:filter .12s;}
  .node.obs rect{fill:var(--obs);stroke:var(--obs2);}
  .node.hid rect{fill:#eef1f6;stroke:#c4cddd;}
  .node.param rect{fill:#eef2f7;stroke:#94a3b8;stroke-dasharray:4 3;}
  .node.sel rect{stroke:#0b1220;stroke-width:3;filter:drop-shadow(0 6px 16px rgba(16,24,40,.26));}
  .node{cursor:pointer;}
  /* Node symbols live in an HTML overlay synced to the SVG viewBox
     (foreignObject positions unreliably under viewBox transforms in
     WebKit, which detached every label from its card in Safari). */
  #labels{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  #labelsInner{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;}
  .nlab{position:absolute;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;pointer-events:none;}
  .nlab.obs{color:#fff;} .nlab.hid{color:#1e293b;} .nlab.param{color:#334155;}
  .nlab.dim{opacity:.45;transition:opacity .18s;}
  .nl code{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;font-size:14px;}
  /* dimming keeps node cards legible (they still read as boxes, just quiet);
     edges fade harder since they are not the point in overview. */
  .node.dim{opacity:.45;transition:opacity .18s;}
  .edge.dim{opacity:.08;transition:opacity .18s;}
  .dim{opacity:.09;transition:opacity .18s;}
  #measure{position:absolute;left:-9999px;top:-9999px;font-size:22px;visibility:hidden;}
  #measure code{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;font-size:14px;}
  /* legend */
  .legend{position:fixed;left:18px;bottom:16px;z-index:8;display:flex;gap:12px;align-items:center;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:12px;padding:9px 14px;font-size:.78rem;color:var(--muted);box-shadow:0 4px 18px rgba(16,24,40,.06);}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .legend .legend-title{font-family:var(--font-serif);font-weight:700;font-size:.92rem;color:var(--ink);letter-spacing:-.005em;}
  .legend .g{color:var(--ink2);font-weight:700;text-transform:uppercase;font-size:.66rem;letter-spacing:.06em;}
  .legend .sep{width:1px;height:16px;background:var(--line);}
  .sw{width:12px;height:12px;border-radius:4px;display:inline-block;}
  /* code rail: the container placement is page-specific; the pills are .om-chip */
  .codes{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);max-width:min(74vw,880px);display:flex;align-items:center;gap:7px;padding:8px 12px;background:rgba(255,255,255,.93);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 26px rgba(22,24,29,.10);z-index:9;overflow-x:auto;}
  .codes .lab2{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);font-weight:800;flex:none;}
  /* provenance panel: the floating surface is the shared .om-panel; only its
     placement + content styles live here (page-specific). */
  .om-panel{position:fixed;top:72px;right:18px;width:360px;max-height:calc(100vh - 92px);overflow:auto;z-index:18;display:none;}
  .om-panel .x{float:right;cursor:pointer;color:#cbd5e1;font-size:1.6rem;line-height:1;padding:2px 8px;margin:-4px -6px 0 0;transition:.12s;} .om-panel .x:hover,.om-panel .x:active{color:#64748b;}
  .om-panel .sym{font-size:1.8rem;color:#312e81;}
  .om-panel .badge{display:inline-block;font-size:.58rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;border-radius:999px;padding:3px 9px;margin-left:10px;vertical-align:middle;}
  .om-panel .badge.observable{background:var(--obs);} .om-panel .badge.hidden{background:#94a3b8;} .om-panel .badge.parameter{background:#64748b;}
  .om-panel .tiertag{display:inline-block;font-size:.62rem;font-weight:700;color:var(--muted);background:var(--band);border:1px solid var(--bandln);border-radius:999px;padding:3px 9px;margin-left:8px;vertical-align:middle;}
  .om-panel .name{font-family:var(--font-mono);font-feature-settings:"zero" 1;color:#64748b;font-size:.78rem;margin:.55em 0 .1em;word-break:break-word;}
  .om-panel .name .tiertag{font-family:var(--font-sans,'Inter',sans-serif);}   /* the tier pill stays UI type */
  .om-panel .uid{font-family:var(--font-mono);font-feature-settings:"zero" 1;font-size:.66rem;color:#a3aec0;margin-left:8px;vertical-align:middle;}
  .legend .ver{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.7rem;color:#a3aec0;}
  .formula{background:linear-gradient(180deg,#fbfaf8,#f5f3ef);border:1px solid var(--line);border-radius:12px;padding:13px 12px;overflow-x:auto;}
  .formula code{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;font-size:.82rem;color:#334155;white-space:pre-wrap;word-break:break-word;}
  .fop{font-size:.72rem;font-weight:700;color:#64748b;margin:10px 0 4px;font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;}
  .fop:first-of-type{margin-top:2px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{font-size:1.15rem;border:1px solid var(--line);background:#fff;border-radius:10px;padding:4px 11px;color:#312e81;cursor:pointer;transition:.12s;box-shadow:0 1px 2px rgba(16,24,40,.05);}
  .chip:hover,.chip:active,.chip:focus{border-color:var(--obs);box-shadow:0 2px 9px rgba(79,70,229,.16);outline:none;}
  .chip code{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;font-size:.86rem;}
  /* the "mapped by code" provenance list is the shared .om-kv; the code name
     (key) keeps its indigo accent, page-specific. */
  .om-panel .mapby .om-kv-k{font-weight:700;color:#312e81;}
  .om-panel .mapby .om-kv-v{font-size:.76rem;max-width:190px;}
  .muted{color:#94a3b8;}
  /* edge formula tip */
  #tip{position:fixed;z-index:30;pointer-events:none;background:rgba(15,23,42,.96);color:#fff;border-radius:10px;padding:9px 11px;max-width:420px;box-shadow:0 10px 30px rgba(16,24,40,.34);display:none;}
  #tip .op{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;color:#a5b4fc;font-weight:800;margin-bottom:5px;}
  #tip .fx{overflow-x:auto;} #tip .fx .katex{color:#fff;}
  #tip .fx code{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;font-size:.78rem;color:#e2e8f0;white-space:pre-wrap;}
  /* offline banner */
  #banner{position:fixed;top:60px;left:0;right:0;background:#fef3c7;color:#8a5a09;font:13px/1.4 'Inter',sans-serif;font-weight:600;padding:8px 14px;z-index:15;display:none;border-bottom:1px solid #f4dfa0;}
  /* static fallback outline (dagre missing) */
  #fallback{position:fixed;top:100px;left:0;right:0;bottom:0;overflow:auto;padding:20px 26px 60px;display:none;}
  #fallback .ft{font-size:1.15rem;font-weight:800;color:#312e81;margin:22px 0 4px;}
  #fallback .fd{color:#6b7796;font-size:.88rem;margin-bottom:12px;}
  #fallback .fn{border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin:8px 0;background:#fff;}
  #fallback .fn .fs{font-weight:700;color:#0b1220;}
  #fallback .fn .fs code{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;}
  #fallback .fn .fk{font-size:.66rem;text-transform:uppercase;letter-spacing:.05em;font-weight:700;padding:2px 8px;border-radius:999px;margin-left:8px;vertical-align:middle;}
  #fallback .fn .fk.observable{background:#eef2ff;color:#4338ca;} #fallback .fn .fk.hidden{background:#f1f5f9;color:#64748b;} #fallback .fn .fk.parameter{background:#f1f5f9;color:#64748b;}
  #fallback .fn .fe{color:#475569;font-size:.83rem;margin-top:6px;}
  #fallback .fn .fe .arw{color:#a3aec0;}
  /* ---- mobile: bottom-sheet panel, horizontal code rail, tighter chrome ---- */
  @media (max-width:768px){
    .top{gap:9px;padding:0 12px;}
    .top .sub{display:none;}
    .top .nav{display:none;}          /* nav collapses on small screens; brand still links home */
    .top .om-search{margin-left:10px;max-width:none;}
    /* controls stay >=40px tall for reliable touch targets */
    .top .om-btn{padding:11px 13px;font-size:.8rem;min-height:40px;}
    .top .om-input{padding-top:11px;padding-bottom:11px;min-height:40px;}
    /* the side panel becomes a scrollable bottom sheet */
    .om-panel{top:auto;left:0;right:0;bottom:0;width:auto;max-width:none;
      max-height:55vh;border-radius:var(--r-3) var(--r-3) 0 0;
      box-shadow:0 -12px 36px rgba(22,24,29,.20);border-bottom:none;padding:18px 18px 22px;}
    /* code rail: keep it a single horizontally scrollable strip above the sheet */
    .codes{left:8px;right:8px;transform:none;max-width:none;bottom:12px;}
    .legend{display:none;}            /* the legend crowds small screens; encoding is shown in-panel */
    /* tier band headings shrink so columns stay legible when zoomed out */
    .band .h{letter-spacing:0;}
  }
  /* very narrow screens: the wordmark, a usable search, and three control
     buttons cannot all fit on one 56px row, and the search was collapsing to
     its icon while Fit ran off the right edge. Drop the wordmark to just its
     home-linking dot so the search stays usable and every control stays on
     screen. (The tracer keeps its wordmark: it has a single control button.) */
  @media (max-width:480px){
    .top .brand span:not(.om-dot){display:none;}
    .top .brand{gap:0;}
    .top .brand .om-dot{width:9px;height:9px;margin-bottom:0;}
    .top .om-search{margin-left:0;}
    .top .controls{gap:7px;}
    .top .controls .om-btn{padding:11px 11px;}
  }
  /* focus-visible ring consistent with the rest of the site */
  a:focus-visible,button:focus-visible,input:focus-visible,.node:focus-visible{outline:2px solid var(--obs);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){
    *{transition-duration:.001ms !important;}
    /* viewBox writes are not CSS animation; the panel/tip
       transitions are the only motion, and they are disabled above. */
  }
</style>

<script>
"use strict";
// ============================================================================
//  openmaterials map: layered physics-tier pipeline.
//  Sections in reading order:
//    - shared    : DOM handles, small helpers (tex fallback, esc)
//    - data      : fetch graph/codes, build adjacency
//    - layout    : dagre for vertical spacing, tier-band x-override for columns
//    - render    : bands, nodes (structure only)
//    - interaction: pan/zoom, depth levels, provenance panel, code rails, search
//    - fallback  : static readable outline when dagre is missing
//  KaTeX and dagre both degrade: no code path throws when either is undefined.
// ============================================================================

// ---- shared ----------------------------------------------------------------
const svg=document.getElementById('svg'), vp=document.getElementById('vp'),
      bandsG=document.getElementById('bands'), measure=document.getElementById('measure'),
      tip=document.getElementById('tip'), panelEl=document.getElementById('panel');
const HAS_KATEX = (typeof katex!=='undefined');
const HAS_DAGRE = (typeof dagre!=='undefined');

let VB={x:0,y:0,w:1000,h:1000}, GW=1000, GH=1000;
let nodeById={}, parents={}, children={}, symHtml={}, pos={},
    codesData={}, activeCode=null, tierList=[], tierIndex={}, edgeList=[],
    depth='overview';   // 'overview' | 'expanded' | 'focused'

function err(m){ const e=document.getElementById('err'); e.style.display='block'; e.textContent='Error: '+m; }
function banner(m){ const b=document.getElementById('banner'); b.style.display='block'; b.textContent=m; }
function setVB(){ svg.setAttribute('viewBox', VB.x+' '+VB.y+' '+VB.w+' '+VB.h); syncLabels(); }
// Mirror the viewBox transform onto the HTML label layer
// (preserveAspectRatio="xMidYMid meet" semantics, computed by hand).
function syncLabels(){
  const inner=document.getElementById('labelsInner'); if(!inner) return;
  const r=svg.getBoundingClientRect(); if(!r.width||!r.height||!VB.w||!VB.h) return;
  const sc=Math.min(r.width/VB.w, r.height/VB.h);
  const tx=(r.width-VB.w*sc)/2 - VB.x*sc;
  const ty=(r.height-VB.h*sc)/2 - VB.y*sc;
  inner.style.transform='translate('+tx+'px,'+ty+'px) scale('+sc+')';
}
window.addEventListener('resize', syncLabels);
let labelById={};
// Render LaTeX with KaTeX; on any failure fall back to the raw string.
function tex(latex,display){
  if(latex==null) return '';
  if(HAS_KATEX){ try{ return katex.renderToString(latex,{throwOnError:false,displayMode:!!display}); }catch(e){ /* fall through */ } }
  return '<code>'+esc(''+latex)+'</code>';
}
function esc(s){ return (''+s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function attr(s){ return (''+s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ---- data ------------------------------------------------------------------
// The map is the VIEW of the structure MODEL: nodes, edges, formulas, and the
// code representations that map onto them. Values, instances, and spectra are a
// separate evidence layer that consumers load against node uids; the map page
// never fetches or renders them (see the paper's MVC statement).
Promise.all([
  fetch('../data/graph.json?v='+Date.now()).then(r=>r.json()),
  fetch('../data/codes.json?v='+Date.now()).then(r=>r.json()).catch(()=>({})),
  fetch('../data/version.json?v='+Date.now()).then(r=>r.json()).catch(()=>null),
  fetch('../data/semantics.json?v='+Date.now()).then(r=>r.json()).catch(()=>[])
]).then(build).catch(e=> err('data: '+e));

// The semantic index: a node/edge's surface labels (auto + curated), keyed by
// id. Labels are structure metadata over uids, not evidence, so the map view
// stays MVC-pure. resolveLabel() mirrors omai/semantics.resolve: normalize,
// exact-alias, token-containment; deterministic, no server call.
let semById={};
function normLabel(s){ return String(s).replace(/([a-z0-9])([A-Z])/g,'$1 $2').replace(/[-_]/g,' ').toLowerCase().replace(/[^a-z0-9 ]+/g,' ').replace(/\s+/g,' ').trim(); }
const STOP=new Set(['calculation','estimation','computation','analysis','the','a','an','of','and']);
function tokset(s){ return new Set(normLabel(s).split(' ').filter(t=> t && !STOP.has(t))); }
function resolveLabel(q){
  const nq=normLabel(q), qt=tokset(q); if(!nq) return [];
  const out=[];
  for(const id in semById){
    const e=semById[id]; let score=0;
    if((e.curated||[]).some(c=> normLabel(c)===nq)) score=1.0;
    else if((e.labels||[]).some(l=> normLabel(l)===nq)) score=0.9;
    else if(qt.size){ const es=tokset((e.labels||[]).join(' ')+' '+id); let all=true; qt.forEach(t=>{ if(!es.has(t)) all=false; }); if(all) score=0.65; }
    if(score) out.push({id, kind:e.kind, score});
  }
  return out.sort((a,b)=> b.score-a.score || a.id.localeCompare(b.id));
}

function build([graph, codes, version, semantics]){
  (semantics||[]).forEach(e=>{ semById[e.id]=e; });
  codesData = codes || {};
  if(version && version.version){
    const vh=document.getElementById('mapverhash');
    vh.textContent=(''+version.version).slice(0,12);
    vh.title='store head '+version.version+(version.genesis?('\ngenesis '+version.genesis):'');
    document.getElementById('mapver').style.display='';
    document.getElementById('versep').style.display='';
  }
  graph.nodes.forEach(n=>{ nodeById[n.id]=n; symHtml[n.id]=tex(n.symbol); });

  const seen=new Set();
  graph.links.forEach(l=>{ const k=l.source+'>>'+l.target;
    if(!seen.has(k) && l.source!==l.target && nodeById[l.source] && nodeById[l.target]){
      seen.add(k); edgeList.push(l);
      (children[l.source]=children[l.source]||[]).push(l.target);
      (parents[l.target]=parents[l.target]||[]).push(l.source);
    }
  });

  tierList = (graph.tiers||[]).slice().sort((a,b)=> a.order-b.order);
  tierList.forEach((t,i)=>{ tierIndex[t.name]=i; });
  let needsOther=false;
  graph.nodes.forEach(n=>{ if(!(n.tier in tierIndex)) needsOther=true; });
  if(needsOther){ tierList.push({name:'Other', order:1e6, description:'Nodes without an assigned tier.'}); tierIndex['Other']=tierList.length-1; }
  function bandOf(n){ return (n.tier in tierIndex) ? tierIndex[n.tier] : tierIndex['Other']; }

  graph.nodes.forEach(n=>{ measure.innerHTML=symHtml[n.id]||''; n._w=Math.max(56, measure.offsetWidth+30); n._h=Math.max(44, measure.offsetHeight+20); });

  if(HAS_DAGRE) layoutAndRender(graph, bandOf);
  else renderFallback(graph, bandOf);

  renderCodeBar();
}

// ---- layout ----------------------------------------------------------------
const BAND_W=360, BAND_GAP=54, BAND_PADX=26, HEAD_H=118;
function layoutAndRender(graph, bandOf){
  const g=new dagre.graphlib.Graph();
  g.setGraph({rankdir:'LR', nodesep:22, ranksep:120, marginx:24, marginy:HEAD_H});
  g.setDefaultEdgeLabel(()=>({}));
  graph.nodes.forEach(n=> g.setNode(n.id,{width:n._w,height:n._h}));
  edgeList.filter(e=> e.kind!=='param').forEach(e=> g.setEdge(e.source,e.target));
  dagre.layout(g);

  const bandOfNodes={};
  graph.nodes.forEach(n=>{ const b=bandOf(n); (bandOfNodes[b]=bandOfNodes[b]||[]).push(n); });
  Object.keys(bandOfNodes).forEach(bi=>{
    const list=bandOfNodes[bi];
    const xs=[...new Set(list.map(n=> Math.round(g.node(n.id).x)))].sort((a,b)=>a-b);
    const nCol=xs.length, usable=BAND_W-2*BAND_PADX;
    list.forEach(n=>{
      const gn=g.node(n.id);
      const ci=xs.indexOf(Math.round(gn.x));
      const localX = nCol<=1 ? BAND_W/2 : (BAND_PADX + n._w/2 + (usable-n._w)*(ci/(nCol-1)));
      const bx = (+bi)*(BAND_W+BAND_GAP) + localX;
      pos[n.id]={x:bx, y:gn.y, w:gn.width, h:gn.height, band:+bi, col:ci};
    });
  });
  graph.nodes.forEach(n=>{ if(!pos[n.id]){ const b=bandOf(n); pos[n.id]={x:b*(BAND_W+BAND_GAP)+BAND_W/2, y:HEAD_H+40, w:n._w, h:n._h, band:b, col:0}; } });

  let minY=1e9, maxY=-1e9;
  graph.nodes.forEach(n=>{ const p=pos[n.id]; minY=Math.min(minY,p.y-p.h/2); maxY=Math.max(maxY,p.y+p.h/2); });
  GW = tierList.length*(BAND_W+BAND_GAP);
  GH = Math.max(maxY+60, HEAD_H+200);

  renderBands(minY, maxY);
  renderGraph(graph);
  fitAll();
  applyDepth();
}

// ---- render ----------------------------------------------------------------
function renderBands(minY, maxY){
  const top=Math.min(minY-20, HEAD_H-30), bottom=Math.max(maxY+30, GH-20), h=bottom-top;
  let s='';
  tierList.forEach((t,i)=>{
    const x=i*(BAND_W+BAND_GAP);
    s+='<g class="band" data-band="'+i+'">';
    s+='<rect x="'+(x+4)+'" y="'+top+'" width="'+(BAND_W-8)+'" height="'+h+'" rx="20"></rect>';
    if(i>0) s+='<line class="bl" x1="'+(x-BAND_GAP/2)+'" y1="'+top+'" x2="'+(x-BAND_GAP/2)+'" y2="'+bottom+'"></line>';
    s+='<text class="ord" x="'+(x+BAND_PADX)+'" y="'+(top+40)+'" font-size="15">'+(t.order===1e6?'*':(t.order+1).toString().padStart(2,'0'))+'</text>';
    s+='<text class="h" x="'+(x+BAND_PADX)+'" y="'+(top+66)+'" font-size="23">'+esc(t.name)+'</text>';
    s+=wrapText(t.description||'', x+BAND_PADX, top+90, BAND_W-2*BAND_PADX-6, 13, 'sh', 3);
    s+='</g>';
  });
  bandsG.innerHTML=s;
}
function wrapText(str, x, y, maxW, size, cls, maxLines){
  const words=(''+str).split(/\s+/), lines=[]; let cur='';
  const cpl=Math.max(8, Math.floor(maxW/(size*0.52)));
  words.forEach(w=>{ const test=cur?cur+' '+w:w; if(test.length>cpl && cur){ lines.push(cur); cur=w; } else cur=test; });
  if(cur) lines.push(cur);
  const use=lines.slice(0,maxLines);
  if(lines.length>maxLines && use.length){ let last=use[use.length-1]; if(last.length>cpl-1) last=last.slice(0,cpl-2); use[use.length-1]=last+'...'; }
  return use.map((ln,i)=> '<text class="'+cls+'" x="'+x+'" y="'+(y+i*(size+4))+'" font-size="'+size+'">'+esc(ln)+'</text>').join('');
}

function renderGraph(graph){
  let s='', lhtml='';
  edgeList.forEach(e=>{ const a=pos[e.source], b=pos[e.target]; if(!a||!b) return;
    s+='<path class="edge'+(e.kind==='param'?' param':'')+'" data-edge="'+attr(e.source+'>>'+e.target)+'" data-op="'+attr(e.op||'')+'" d="'+edgePath(a,b)+'" marker-end="url(#arrow)"></path>';
  });
  graph.nodes.forEach(n=>{ const p=pos[n.id]; if(!p) return;
    const x=p.x-p.w/2, y=p.y-p.h/2;
    const cls=(n.type==='observable'?'obs':(n.type==='parameter'?'param':'hid'));
    s+='<g class="node '+cls+'" data-id="'+attr(n.id)+'" data-type="'+n.type+'">';
    s+='<rect x="'+x+'" y="'+y+'" width="'+p.w+'" height="'+p.h+'" rx="13"></rect>';
    lhtml+='<div class="nlab '+(n.type==='observable'?'obs':(n.type==='parameter'?'param':'hid'))+'" data-id="'+attr(n.id)+'" style="left:'+x+'px;top:'+y+'px;width:'+p.w+'px;height:'+p.h+'px">'+(symHtml[n.id]||'')+'</div>';
    s+='</g>';
  });
  vp.innerHTML=s;
  const inner=document.getElementById('labelsInner');
  inner.innerHTML=lhtml;
  labelById={};
  inner.querySelectorAll('.nlab').forEach(l=>{ labelById[l.dataset.id]=l; });
  // Mirror the nodes' dim state onto their labels so card and symbol fade
  // together, without touching any of the state-toggling call sites.
  if(!window.__labelMirror){
    window.__labelMirror=new MutationObserver(muts=>{
      muts.forEach(m=>{
        const el=m.target;
        if(!el.classList||!el.classList.contains('node')||!el.dataset.id) return;
        const lab=labelById[el.dataset.id];
        if(lab) lab.classList.toggle('dim', el.classList.contains('dim'));
      });
    });
    window.__labelMirror.observe(vp,{attributes:true,subtree:true,attributeFilter:['class']});
  }
  syncLabels();
}
function edgePath(a,b){
  const x0=a.x+a.w/2, y0=a.y, x1=b.x-b.w/2, y1=b.y;
  if(x1>=x0){ const dx=Math.max(30,(x1-x0)*0.45);
    return 'M'+x0+' '+y0+' C'+(x0+dx)+' '+y0+' '+(x1-dx)+' '+y1+' '+x1+' '+y1; }
  const mx=(x0+x1)/2, my=(y0+y1)/2 - Math.max(50, Math.abs(y1-y0)*0.3+50);
  return 'M'+x0+' '+y0+' C'+(x0+70)+' '+my+' '+(x1-70)+' '+my+' '+x1+' '+y1;
}

// ---- interaction: pan / zoom -----------------------------------------------
function fitAll(){ const pad=40; VB={x:-pad,y:-pad,w:GW+2*pad,h:GH+2*pad}; setVB(); }
function fitTo(ids){ let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  ids.forEach(id=>{ const q=pos[id]; if(!q)return; x0=Math.min(x0,q.x-q.w/2); y0=Math.min(y0,q.y-q.h/2); x1=Math.max(x1,q.x+q.w/2); y1=Math.max(y1,q.y+q.h/2); });
  if(x1<x0)return; const pad=110; VB={x:x0-pad,y:y0-pad,w:(x1-x0)+2*pad,h:(y1-y0)+2*pad}; setVB();
}
let dragging=false, moved=false, sx=0, sy=0, vbs=null;
svg.addEventListener('mousedown', e=>{ dragging=true; moved=false; sx=e.clientX; sy=e.clientY; vbs={x:VB.x,y:VB.y}; svg.classList.add('drag'); });
window.addEventListener('mouseup', ()=>{ dragging=false; svg.classList.remove('drag'); });
window.addEventListener('mousemove', e=>{ if(!dragging)return; const m=svg.getScreenCTM(); if(!m)return; const dx=(e.clientX-sx)/m.a, dy=(e.clientY-sy)/m.d; if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4) moved=true; VB.x=vbs.x-dx; VB.y=vbs.y-dy; setVB(); });
svg.addEventListener('wheel', e=>{ e.preventDefault(); const m=svg.getScreenCTM(); if(!m)return; const pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY; const u=pt.matrixTransform(m.inverse()); const f=e.deltaY>0?1.12:0.893; VB.x=u.x-(u.x-VB.x)*f; VB.y=u.y-(u.y-VB.y)*f; VB.w*=f; VB.h*=f; setVB(); }, {passive:false});

// ---- interaction: touch (pan / pinch / tap) --------------------------------
// Touch is handled independently of the mouse path so desktop behavior is
// untouched. A client (screen) point maps to SVG-user space by inverting the
// preserveAspectRatio="xMidYMid meet" fit (the same math syncLabels uses), so
// no getScreenCTM is needed and every viewport change routes through VB+setVB,
// keeping the HTML label overlay in sync. Single finger pans; two fingers pinch
// zoom about the midpoint; a finger down-and-up under a small movement
// threshold is a tap that selects (it re-uses the click routing).
function clientToUser(cx,cy){
  const r=svg.getBoundingClientRect();
  const sc=Math.min(r.width/VB.w, r.height/VB.h) || 1;
  const ox=(r.width-VB.w*sc)/2, oy=(r.height-VB.h*sc)/2;
  return { x:(cx-r.left-ox)/sc + VB.x, y:(cy-r.top-oy)/sc + VB.y };
}
let tPan=null, tPinch=null, tMoved=false, tStart=null;
function touchMid(t){ return { x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2 }; }
function touchDist(t){ const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.hypot(dx,dy); }
svg.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    tPinch=null; tMoved=false;
    const t=e.touches[0]; tStart={x:t.clientX,y:t.clientY,target:e.target};
    tPan={x:t.clientX,y:t.clientY,vbx:VB.x,vby:VB.y};
  } else if(e.touches.length===2){
    e.preventDefault(); tPan=null; tMoved=true;
    tPinch={dist:touchDist(e.touches)||1,vb:{x:VB.x,y:VB.y,w:VB.w,h:VB.h}};
  }
}, {passive:false});
svg.addEventListener('touchmove', e=>{
  if(tPinch && e.touches.length>=2){
    e.preventDefault();
    const mid=touchMid(e.touches);
    // anchor the pinch about the user-space point under the finger midpoint,
    // measured against the gesture's starting viewBox
    VB=tPinch.vb;
    const u=clientToUser(mid.x,mid.y);
    const f=tPinch.dist/(touchDist(e.touches)||1);
    VB={ x:u.x-(u.x-tPinch.vb.x)*f, y:u.y-(u.y-tPinch.vb.y)*f, w:tPinch.vb.w*f, h:tPinch.vb.h*f };
    setVB();
  } else if(tPan && e.touches.length===1){
    const t=e.touches[0];
    if(Math.abs(t.clientX-tPan.x)+Math.abs(t.clientY-tPan.y)>6) tMoved=true;
    if(!tMoved) return;
    e.preventDefault();
    const r=svg.getBoundingClientRect();
    const sc=Math.min(r.width/VB.w, r.height/VB.h) || 1;
    VB.x=tPan.vbx-(t.clientX-tPan.x)/sc; VB.y=tPan.vby-(t.clientY-tPan.y)/sc; setVB();
  }
}, {passive:false});
svg.addEventListener('touchend', e=>{
  if(e.touches.length===0){
    if(tPan && !tMoved && tStart){
      const nd=tStart.target.closest && tStart.target.closest('.node');
      const ed=tStart.target.closest && tStart.target.closest('.edge');
      if(nd){ selectNode(nodeById[nd.dataset.id]); }
      else if(ed){ selectEdge(ed.dataset.edge, ed.dataset.op); }
      else { clearSel(); }
    }
    tPan=null; tPinch=null; tStart=null;
  }
}, {passive:false});

// ---- interaction: dimming --------------------------------------------------
// expanded: full DAG at strength. focused: node select dims all but the
// node's closed neighborhood.
function clearDim(){ vp.querySelectorAll('.dim').forEach(el=>el.classList.remove('dim')); vp.querySelectorAll('.hot').forEach(el=>el.classList.remove('hot')); vp.querySelectorAll('.sel').forEach(el=>el.classList.remove('sel')); }
function applyDepth(){ clearDim(); }

// ---- interaction: focus + selection ----------------------------------------
function focusNode(id){
  depth='focused';
  const keep=new Set([id].concat(parents[id]||[]).concat(children[id]||[]));
  clearDim();
  vp.querySelectorAll('.node').forEach(el=>{ el.classList.toggle('dim', !keep.has(el.dataset.id)); el.classList.toggle('sel', el.dataset.id===id); });
  vp.querySelectorAll('.edge').forEach(el=>{ const ab=el.dataset.edge.split('>>'); const inc=(ab[0]===id||ab[1]===id); el.classList.toggle('dim', !inc); el.classList.toggle('hot', inc); });
}
function clearSel(){
  depth='expanded'; panelEl.style.display='none';
  activeCode=null; document.querySelectorAll('.codes .om-chip.on').forEach(e=>e.classList.remove('on'));
  applyDepth();
}
window.navTo=function(id){ const n=nodeById[id]; if(n) selectNode(n); };
function chip(id){ return '<span class="chip" onclick="navTo(\''+attr(id).replace(/'/g,"&#39;")+'\')">'+(symHtml[id]||esc(id))+'</span>'; }

function mappedByHtml(id){
  const rows=Object.keys(codesData).filter(c=> codesData[c] && codesData[c][id]).sort().map(c=>{ const m=codesData[c][id]; return '<div class="om-kv-row"><span class="om-kv-k">'+esc(c)+'</span><span class="om-kv-v">'+esc((m.api||''))+(m.unit?(' · '+esc(m.unit)):'')+'</span></div>'; });
  return rows.length? ('<div class="om-panel-label">mapped by '+rows.length+' code'+(rows.length>1?'s':'')+'</div><div class="mapby om-kv">'+rows.join('')+'</div>') : '';
}
function selectNode(node){
  if(!node) return;
  const id=node.id; focusNode(id);
  const ins=parents[id]||[], outs=children[id]||[];
  let h='<span class="x" onclick="clearSel()">×</span>';
  h+='<div><span class="sym">'+tex(node.symbol)+'</span><span class="badge '+node.type+'">'+esc(node.type)+'</span></div>';
  h+='<div class="name">'+esc(node.id)+'<span class="tiertag">'+esc(node.tier||'Other')+'</span>'+(node.uid?('<span class="uid" title="'+attr(node.uid)+'">'+esc((''+node.uid).slice(0,12))+'</span>'):'')+'</div>';
  const fl=(node.formulas&&node.formulas.length)?node.formulas:(node.formula?[{op:'',latex:node.formula}]:[]);
  if(!fl.length){ h+='<div class="om-panel-label">formula on the producing edge</div><div class="formula"><span class="muted">source (provided value)</span></div>'; }
  else if(fl.length===1){ h+='<div class="om-panel-label">formula on the producing edge</div><div class="formula">'+tex(fl[0].latex,true)+'</div>'; }
  else{
    h+='<div class="om-panel-label">'+fl.length+' producing edges (alternative routes)</div>';
    fl.forEach(f=>{ h+='<div class="fop">'+esc(f.op)+'</div><div class="formula">'+tex(f.latex,true)+'</div>'; });
  }
  if(outs.length){ h+='<div class="om-panel-label">produces &rarr;</div><div class="chips">'+outs.map(chip).join('')+'</div>'; }
  if(ins.length){ h+='<div class="om-panel-label">&larr; from</div><div class="chips">'+ins.map(chip).join('')+'</div>'; }
  h+=mappedByHtml(id);
  panelEl.innerHTML=h; panelEl.style.display='block';
}
function opName(op){ return (op||'').replace(/\[.*?\]/g,'').replace(/_/g,' ').trim() || 'operation'; }
function selectEdge(key, op){
  const [s,t]=key.split('>>'); const tn=nodeById[t], sn=nodeById[s]; if(!tn||!sn) return;
  depth='focused';
  clearDim();
  vp.querySelectorAll('.node').forEach(el=> el.classList.toggle('dim', !(el.dataset.id===s||el.dataset.id===t)));
  vp.querySelectorAll('.edge').forEach(el=>{ const on=el.dataset.edge===key; el.classList.toggle('dim', !on); el.classList.toggle('hot', on); });
  let h='<span class="x" onclick="clearSel()">×</span><div class="om-panel-label">operator</div><div class="name" style="font-weight:700;color:#312e81;font-size:.95rem">'+esc(opName(op))+'</div>';
  h+='<div class="sym" style="margin-top:8px">'+tex(sn.symbol)+' <span style="color:#a3aec0">&rarr;</span> '+tex(tn.symbol)+'</div>';
  h+='<div class="om-panel-label">computes</div><div class="formula">'+(tn.formula?tex(tn.formula,true):'<span class="muted">source (provided value)</span>')+'</div>';
  panelEl.innerHTML=h; panelEl.style.display='block';
}

// click routing
svg.addEventListener('click', e=>{ if(moved)return;
  const nd=e.target.closest('.node'); if(nd){ selectNode(nodeById[nd.dataset.id]); return; }
  const ed=e.target.closest('.edge'); if(ed){ selectEdge(ed.dataset.edge, ed.dataset.op); return; }
  clearSel();
});

// ---- interaction: edge formula hover ---------------------------------------
svg.addEventListener('mousemove', e=>{ const ed=e.target.closest('.edge'); if(!ed){ tip.style.display='none'; return; }
  const [s,t]=ed.dataset.edge.split('>>'); const tn=nodeById[t]; if(!tn) return;
  const body = tn.formula ? tex(tn.formula) : '<span style="color:#cbd5e1">source (provided value)</span>';
  tip.innerHTML='<div class="op">'+esc(opName(ed.dataset.op))+'</div><div class="fx">'+body+'</div>';
  tip.style.display='block';
  let tx=e.clientX+16, ty=e.clientY+16;
  const r=tip.getBoundingClientRect();
  if(tx+r.width>window.innerWidth-8) tx=e.clientX-r.width-16;
  if(ty+r.height>window.innerHeight-8) ty=e.clientY-r.height-16;
  tip.style.left=tx+'px'; tip.style.top=ty+'px';
});
svg.addEventListener('mouseleave', ()=>{ tip.style.display='none'; });

// ---- interaction: code rails -----------------------------------------------
function codeCredit(code){ const sp=codesData[code]||{}; const any=Object.values(sp).find(e=>e && (e.citation||e.license)); if(!any) return ''; const cit=(any.citation||'').trim(); const lic=(any.license||'').trim(); return cit&&lic?(cit+' - '+lic):(cit||lic); }
function renderCodeBar(){ const el=document.getElementById('codes'); Object.keys(codesData).sort().forEach(code=>{ const c=document.createElement('span'); c.className='om-chip'; c.dataset.code=code; const cr=codeCredit(code); if(cr) c.title=cr; c.innerHTML=esc(code)+'<span class="n">'+Object.keys(codesData[code]||{}).length+'</span>'; c.onclick=()=>toggleCode(code); el.appendChild(c); }); }
function toggleCode(code){
  if(activeCode===code){ activeCode=null; document.querySelectorAll('.codes .om-chip').forEach(e=>e.classList.remove('on')); depth='expanded'; applyDepth(); return; }
  activeCode=code; document.querySelectorAll('.codes .om-chip').forEach(e=> e.classList.toggle('on', e.dataset.code===code));
  const set=new Set(Object.keys(codesData[code]||{}));
  depth='focused'; clearDim(); panelEl.style.display='none';
  vp.querySelectorAll('.node').forEach(el=> el.classList.toggle('dim', !set.has(el.dataset.id)));
  vp.querySelectorAll('.edge').forEach(el=>{ const ab=el.dataset.edge.split('>>'); el.classList.toggle('dim', !(set.has(ab[0])&&set.has(ab[1]))); });
  if(set.size) fitTo([...set]);
}

// ---- interaction: search ---------------------------------------------------
document.getElementById('q').addEventListener('input', function(){
  const v=this.value.trim(); if(!v){ clearSel(); return; }
  // Semantic resolution first: a physicist types "quasi-harmonic approximation"
  // or "kappa" and the map grounds it to the matching nodes AND the edges of
  // matched families. Falls back to the id/symbol substring match so partial
  // typing still narrows.
  const resolved=resolveLabel(v);
  let nodeHits, edgeOps;
  if(resolved.length){
    nodeHits=resolved.filter(r=> r.kind==='node').map(r=> r.id).filter(id=> nodeById[id]);
    edgeOps=new Set(resolved.filter(r=> r.kind==='edge').map(r=> r.id));
  } else {
    const lv=v.toLowerCase();
    nodeHits=Object.values(nodeById).filter(n=> (n.id+' '+(n.symbol||'')).toLowerCase().includes(lv)).map(n=>n.id);
    edgeOps=new Set();
  }
  const set=new Set(nodeHits); depth='focused'; clearDim(); panelEl.style.display='none';
  vp.querySelectorAll('.node').forEach(el=> el.classList.toggle('dim', !set.has(el.dataset.id)));
  // an edge lights if it produces/consumes a hit node, or its operator resolved
  vp.querySelectorAll('.edge').forEach(el=>{
    const ab=(el.dataset.edge||'').split('>>'); const opn=el.dataset.op||'';
    const touches=set.has(ab[0])||set.has(ab[1]); const named=edgeOps.has(opn);
    el.classList.toggle('dim', !(touches||named)); el.classList.toggle('hot', named);
  });
  const focusIds=nodeHits.slice();
  if(focusIds.length) fitTo(focusIds);
});

// keyboard: Escape returns from focus/panel.
window.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ if(panelEl.style.display==='block'||depth==='focused'){ clearSel(); } }
});

// ---- fallback: static readable outline (dagre missing) ---------------------
// Each tier heading + its nodes listed (symbol-or-name) with outgoing edges
// named by op, so the page communicates structure without a layout engine.
function renderFallback(graph, bandOf){
  banner('Interactive layout unavailable offline: showing a static outline of the physics tiers.');
  document.getElementById('cy').style.display='none';
  const fb=document.getElementById('fallback'); fb.style.display='block';
  const byBand={};
  graph.nodes.forEach(n=>{ const b=bandOf(n); (byBand[b]=byBand[b]||[]).push(n); });
  let s='';
  tierList.forEach((t,i)=>{
    const list=byBand[i]||[];
    s+='<div class="ft">'+esc(t.name)+'</div><div class="fd">'+esc(t.description||'')+'</div>';
    list.forEach(n=>{
      const outs=(children[n.id]||[]);
      s+='<div class="fn"><span class="fs">'+(symHtml[n.id]||'')+' '+esc(n.id)+'</span><span class="fk '+n.type+'">'+esc(n.type)+'</span>';
      if(outs.length){
        const edg=outs.map(t2=>{ const e=edgeList.find(x=> x.source===n.id && x.target===t2); return '<span class="arw">&rarr;</span> '+esc(t2)+(e&&e.op?(' ('+esc(opName(e.op))+')'):''); });
        s+='<div class="fe">'+edg.join('<br>')+'</div>';
      }
      s+='</div>';
    });
  });
  fb.innerHTML=s;
}
</script>
