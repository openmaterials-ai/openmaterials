<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>openmaterials.ai, map of physics</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root{--ink:#0b1220;--ink2:#334155;--muted:#64748b;--faint:#94a3b8;--line:#e8ecf3;
        --obs:#4f46e5;--obs2:#4338ca;--hidbd:#dde4ee;--gold:#d98a14;--green:#0f9d6b;
        --band:#eef2fb;--bandln:#dbe3f2;--bandtx:#3730a3;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
  #err{position:fixed;top:0;left:0;right:0;background:#7f1d1d;color:#fff;font:13px/1.4 monospace;padding:8px 12px;z-index:60;display:none;white-space:pre-wrap;}
  .top{position:fixed;top:0;left:0;right:0;height:60px;display:flex;align-items:center;gap:13px;padding:0 20px;background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:20;}
  .top .mark{width:22px;height:22px;border-radius:7px;background:linear-gradient(135deg,#818cf8,#4338ca);box-shadow:0 3px 9px rgba(79,70,229,.45);flex:none;}
  .top .brand{font-weight:800;letter-spacing:-.02em;white-space:nowrap;} .top .brand b{color:var(--obs);}
  .top .sub{color:var(--faint);font-size:.82rem;font-weight:500;white-space:nowrap;}
  .top .controls{margin-left:auto;display:flex;gap:9px;align-items:center;}
  .top .btn{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 16px;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--ink2);transition:.15s;white-space:nowrap;}
  .top .btn:hover{background:#f1f4fb;border-color:#d6deea;}
  #cy{position:fixed;top:60px;left:0;right:0;bottom:0;
      background:radial-gradient(circle at 1px 1px,#e6ebf4 1px,transparent 0) -1px -1px/26px 26px,
                 linear-gradient(180deg,#fcfdff,#f4f7fc);}
  svg{width:100%;height:100%;display:block;}
  /* tier bands */
  .band rect{fill:var(--band);opacity:.55;}
  .band .bl{stroke:var(--bandln);stroke-width:1;stroke-dasharray:2 5;opacity:.9;}
  .band .h{font-weight:800;fill:var(--bandtx);letter-spacing:-.01em;}
  .band .sh{fill:#6b7796;font-weight:500;}
  .band .ord{fill:#a9b3ca;font-weight:800;}
  /* edges */
  .edge{fill:none;stroke:#c4cfe0;stroke-width:1.5;stroke-linecap:round;}
  .edge.param{stroke:#cbd4e2;stroke-width:1;stroke-dasharray:3 3;opacity:.42;}
  /* nodes */
  .node rect{stroke-width:1.6;filter:drop-shadow(0 2px 6px rgba(16,24,40,.10));}
  .node.obs rect{fill:var(--obs);stroke:var(--obs2);}
  .node.hid rect{fill:#ffffff;stroke:var(--hidbd);}
  .node.param rect{fill:#eef2f7;stroke:#94a3b8;stroke-dasharray:4 3;}
  .nl{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;}
  .node.obs .nl{color:#fff;} .node.hid .nl{color:#1e293b;} .node.param .nl{color:#334155;}
  .nl code{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;font-size:14px;}
  #measure{position:absolute;left:-9999px;top:-9999px;font-size:22px;visibility:hidden;}
  #measure code{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;font-size:14px;}
</style>
</head>
<body>
<div id="err"></div>
<div class="top">
  <span class="mark"></span>
  <span class="brand">openmaterials<b>.ai</b></span>
  <span class="sub">the unified layer of physics</span>
  <span class="controls">
    <button class="btn" onclick="fitAll()">Fit</button>
  </span>
</div>
<div id="cy"><svg id="svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c3cdde"></path></marker></defs>
  <g id="bands"></g>
  <g id="vp"></g>
</svg></div>
<div id="measure"></div>

<script>window.onerror=function(m){var e=document.getElementById('err');e.style.display='block';e.textContent='Error: '+m;};</script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script>
"use strict";
// ============================================================================
//  openmaterials map: layered physics-tier pipeline (skeleton).
//  Sections in reading order:
//    - shared    : DOM handles, small helpers (tex fallback, esc)
//    - data      : fetch graph/instances/codes, build adjacency
//    - layout    : dagre for vertical spacing, tier-band x-override for columns
//    - render    : bands (heading + subhead), placed nodes, edges
//    - interaction: (filled in a later task)
// ============================================================================

// ---- shared ----------------------------------------------------------------
const svg=document.getElementById('svg'), vp=document.getElementById('vp'),
      bandsG=document.getElementById('bands'), measure=document.getElementById('measure');
const HAS_KATEX = (typeof katex!=='undefined');
const HAS_DAGRE = (typeof dagre!=='undefined');

let VB={x:0,y:0,w:1000,h:1000}, GW=1000, GH=1000;
let nodeById={}, parents={}, children={}, symHtml={}, pos={},
    tierList=[], tierIndex={}, edgeList=[];

function err(m){ const e=document.getElementById('err'); e.style.display='block'; e.textContent='Error: '+m; }
function setVB(){ svg.setAttribute('viewBox', VB.x+' '+VB.y+' '+VB.w+' '+VB.h); }
// Render LaTeX with KaTeX; on any failure fall back to the raw string.
function tex(latex,display){
  if(latex==null) return '';
  if(HAS_KATEX){ try{ return katex.renderToString(latex,{throwOnError:false,displayMode:!!display}); }catch(e){ /* fall through */ } }
  return '<code>'+esc(''+latex)+'</code>';
}
function esc(s){ return (''+s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function attr(s){ return (''+s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ---- data ------------------------------------------------------------------
Promise.all([
  fetch('../data/graph.json?v='+Date.now()).then(r=>r.json()),
  fetch('../data/instances.json?v='+Date.now()).then(r=>r.json()).catch(()=>[]),
  fetch('../data/codes.json?v='+Date.now()).then(r=>r.json()).catch(()=>({}))
]).then(build).catch(e=> err('data: '+e));

function build([graph, insts, codes]){
  graph.nodes.forEach(n=>{ nodeById[n.id]=n; symHtml[n.id]=tex(n.symbol); });

  // adjacency (dedup edges, drop self-loops)
  const seen=new Set();
  graph.links.forEach(l=>{ const k=l.source+'>>'+l.target;
    if(!seen.has(k) && l.source!==l.target && nodeById[l.source] && nodeById[l.target]){
      seen.add(k); edgeList.push(l);
      (children[l.source]=children[l.source]||[]).push(l.target);
      (parents[l.target]=parents[l.target]||[]).push(l.source);
    }
  });

  // tier manifest: sort by order; unknown/empty tier falls into "Other".
  tierList = (graph.tiers||[]).slice().sort((a,b)=> a.order-b.order);
  tierList.forEach((t,i)=>{ tierIndex[t.name]=i; });
  let needsOther=false;
  graph.nodes.forEach(n=>{ if(!(n.tier in tierIndex)) needsOther=true; });
  if(needsOther){ tierList.push({name:'Other', order:1e6, description:'Nodes without an assigned tier.'}); tierIndex['Other']=tierList.length-1; }
  function bandOf(n){ return (n.tier in tierIndex) ? tierIndex[n.tier] : tierIndex['Other']; }

  // measure each node's symbol box for sizing
  graph.nodes.forEach(n=>{ measure.innerHTML=symHtml[n.id]||''; n._w=Math.max(56, measure.offsetWidth+30); n._h=Math.max(44, measure.offsetHeight+20); });

  if(HAS_DAGRE) layoutAndRender(graph, bandOf);
  else err('dagre failed to load (no internet on this browser?)');
}

// ---- layout ----------------------------------------------------------------
// Dagre gives vertical spacing (rankdir LR); we then override each node's x so
// every node of a tier shares a labeled horizontal band and edges flow right.
const BAND_W=360, BAND_GAP=54, BAND_PADX=26, HEAD_H=118;
function layoutAndRender(graph, bandOf){
  const g=new dagre.graphlib.Graph();
  g.setGraph({rankdir:'LR', nodesep:22, ranksep:120, marginx:24, marginy:HEAD_H});
  g.setDefaultEdgeLabel(()=>({}));
  graph.nodes.forEach(n=> g.setNode(n.id,{width:n._w,height:n._h}));
  edgeList.filter(e=> e.kind!=='param').forEach(e=> g.setEdge(e.source,e.target));
  dagre.layout(g);

  const bandOfNodes={};
  graph.nodes.forEach(n=>{ const b=bandOf(n); (bandOfNodes[b]=bandOfNodes[b]||[]).push(n); });

  Object.keys(bandOfNodes).forEach(bi=>{
    const list=bandOfNodes[bi];
    const xs=[...new Set(list.map(n=> Math.round(g.node(n.id).x)))].sort((a,b)=>a-b);
    const nCol=xs.length;
    const usable=BAND_W-2*BAND_PADX;
    list.forEach(n=>{
      const gn=g.node(n.id);
      const ci=xs.indexOf(Math.round(gn.x));
      const localX = nCol<=1 ? BAND_W/2 : (BAND_PADX + n._w/2 + (usable-n._w)*(ci/(nCol-1)));
      const bx = (+bi)*(BAND_W+BAND_GAP) + localX;
      pos[n.id]={x:bx, y:gn.y, w:gn.width, h:gn.height, band:+bi, col:ci};
    });
  });
  graph.nodes.forEach(n=>{ if(!pos[n.id]){ const b=bandOf(n); pos[n.id]={x:b*(BAND_W+BAND_GAP)+BAND_W/2, y:HEAD_H+40, w:n._w, h:n._h, band:b, col:0}; } });

  let minY=1e9, maxY=-1e9;
  graph.nodes.forEach(n=>{ const p=pos[n.id]; minY=Math.min(minY,p.y-p.h/2); maxY=Math.max(maxY,p.y+p.h/2); });
  GW = tierList.length*(BAND_W+BAND_GAP);
  GH = Math.max(maxY+60, HEAD_H+200);

  renderBands(minY, maxY);
  renderGraph(graph);
  fitAll();
}

// ---- render ----------------------------------------------------------------
function renderBands(minY, maxY){
  const top=Math.min(minY-20, HEAD_H-30), bottom=Math.max(maxY+30, GH-20), h=bottom-top;
  let s='';
  tierList.forEach((t,i)=>{
    const x=i*(BAND_W+BAND_GAP);
    s+='<g class="band" data-band="'+i+'">';
    s+='<rect x="'+(x+4)+'" y="'+top+'" width="'+(BAND_W-8)+'" height="'+h+'" rx="20"></rect>';
    if(i>0) s+='<line class="bl" x1="'+(x-BAND_GAP/2)+'" y1="'+top+'" x2="'+(x-BAND_GAP/2)+'" y2="'+bottom+'"></line>';
    s+='<text class="ord" x="'+(x+BAND_PADX)+'" y="'+(top+40)+'" font-size="15">'+(t.order===1e6?'*':(t.order+1).toString().padStart(2,'0'))+'</text>';
    s+='<text class="h" x="'+(x+BAND_PADX)+'" y="'+(top+66)+'" font-size="23">'+esc(t.name)+'</text>';
    s+=wrapText(t.description||'', x+BAND_PADX, top+90, BAND_W-2*BAND_PADX-6, 13, 'sh', 3);
    s+='</g>';
  });
  bandsG.innerHTML=s;
}
// crude word-wrap for band subheads (SVG has no auto-wrap)
function wrapText(str, x, y, maxW, size, cls, maxLines){
  const words=(''+str).split(/\s+/), lines=[]; let cur='';
  const cpl=Math.max(8, Math.floor(maxW/(size*0.52)));
  words.forEach(w=>{ const test=cur?cur+' '+w:w; if(test.length>cpl && cur){ lines.push(cur); cur=w; } else cur=test; });
  if(cur) lines.push(cur);
  const use=lines.slice(0,maxLines);
  if(lines.length>maxLines && use.length){ let last=use[use.length-1]; if(last.length>cpl-1) last=last.slice(0,cpl-2); use[use.length-1]=last+'...'; }
  return use.map((ln,i)=> '<text class="'+cls+'" x="'+x+'" y="'+(y+i*(size+4))+'" font-size="'+size+'">'+esc(ln)+'</text>').join('');
}

function renderGraph(graph){
  let s='';
  edgeList.forEach(e=>{ const a=pos[e.source], b=pos[e.target]; if(!a||!b) return;
    s+='<path class="edge'+(e.kind==='param'?' param':'')+'" data-edge="'+attr(e.source+'>>'+e.target)+'" d="'+edgePath(a,b)+'" marker-end="url(#arrow)"></path>';
  });
  graph.nodes.forEach(n=>{ const p=pos[n.id]; if(!p) return;
    const x=p.x-p.w/2, y=p.y-p.h/2;
    const cls=(n.type==='observable'?'obs':(n.type==='parameter'?'param':'hid'));
    s+='<g class="node '+cls+'" data-id="'+attr(n.id)+'" data-type="'+n.type+'">';
    s+='<rect x="'+x+'" y="'+y+'" width="'+p.w+'" height="'+p.h+'" rx="13"></rect>';
    s+='<foreignObject x="'+x+'" y="'+y+'" width="'+p.w+'" height="'+p.h+'"><div xmlns="http://www.w3.org/1999/xhtml" class="nl">'+(symHtml[n.id]||'')+'</div></foreignObject>';
    s+='</g>';
  });
  vp.innerHTML=s;
}
// Edge path: leave source on its right, enter target on its left, with an
// S-curve. Handles backward edges (target left of source) without kinking.
function edgePath(a,b){
  const x0=a.x+a.w/2, y0=a.y, x1=b.x-b.w/2, y1=b.y;
  if(x1>=x0){ const dx=Math.max(30,(x1-x0)*0.45);
    return 'M'+x0+' '+y0+' C'+(x0+dx)+' '+y0+' '+(x1-dx)+' '+y1+' '+x1+' '+y1; }
  const mx=(x0+x1)/2, my=(y0+y1)/2 - Math.max(50, Math.abs(y1-y0)*0.3+50);
  return 'M'+x0+' '+y0+' C'+(x0+70)+' '+my+' '+(x1-70)+' '+my+' '+x1+' '+y1;
}

// ---- interaction -----------------------------------------------------------
function fitAll(){ const pad=40; VB={x:-pad,y:-pad,w:GW+2*pad,h:GH+2*pad}; setVB(); }
</script>
</body>
</html>
