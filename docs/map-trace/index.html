<link rel="stylesheet" href="../assets/vendor/inter/inter.css">

<style>
  /* The tracer joins the light editorial identity: the map's warm-paper canvas
     and dotted grid, the site's semantic hues (indigo observables, slate hidden
     cards, amber value accents), serif title/headings, mono for ids/paths, and
     the .om-* component library for its controls and floating panel. Behavior
     is frozen: the tracing classes (.up/.down/.dest/.sel) are unchanged; only
     their appearance is retoned from the old dark lab to the light surface.
       up   = amber   (how it is built / value-warm)
       down = indigo  (where it flows / toward observables)
       dest = indigo outline (terminal observable, at rest)
       rest = slate hidden card; sel = ink ring. */
  :root{
    --font-serif:'Source Serif 4',Georgia,'Times New Roman',serif;
    --font-sans:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    --obs:#4f46e5; --obs2:#4338ca;
    --up:#d98a14;          /* upstream / how it's built (value amber) */
    --down:#4f46e5;        /* downstream / where it flows (observable indigo) */
    --ink:#16181d; --ink2:#3d4149; --muted:#6b7078; --faint:#9aa0a8; --line:#e8e6e1;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;}
  #err{position:fixed;top:0;left:0;right:0;background:#7f1d1d;color:#fff;font:13px/1.4 monospace;padding:8px 12px;z-index:40;display:none;white-space:pre-wrap;}
  /* compact header, same treatment as the map: light, hairline, serif wordmark
     + indigo dot, nav links, no stacked bars. */
  .top{position:fixed;top:0;left:0;right:0;height:58px;display:flex;align-items:center;gap:14px;padding:0 clamp(14px,3vw,22px);
    background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(22,24,29,.04);z-index:10;}
  .top .brand{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-serif);font-weight:700;font-size:1.06rem;letter-spacing:-.01em;color:var(--ink);text-decoration:none;white-space:nowrap;}
  .top .brand .om-dot{width:6px;height:6px;border-radius:50%;background:var(--obs);flex:none;display:inline-block;margin-bottom:.28em;}
  .top .sub{color:var(--faint);font-size:.82rem;font-weight:500;white-space:nowrap;}
  .top .om-search{margin-left:12px;flex:1;max-width:320px;}
  .top .nav{display:flex;align-items:center;gap:16px;margin-left:6px;}
  .top .nav a{font-family:'Inter',sans-serif;color:var(--ink2);font-size:.86rem;font-weight:500;white-space:nowrap;text-decoration:none;padding:6px 0;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
  .top .nav a:hover{color:var(--ink);}
  .top .nav a.active{color:var(--ink);border-bottom-color:var(--obs);}
  .top .controls{margin-left:auto;display:flex;gap:12px;align-items:center;}
  .top .hint{color:var(--muted);font-size:.78rem;display:flex;gap:14px;align-items:center;}
  .top .hint kbd{background:#f4f2ee;border:1px solid var(--line);border-radius:6px;padding:2px 7px;font:600 .72rem 'JetBrains Mono',monospace;font-feature-settings:"zero" 1;color:var(--ink2);}
  @media (max-width:768px){
    .top{gap:9px;padding:0 12px;} .top .sub{display:none;} .top .hint{display:none;} .top .nav{display:none;}
    .top .om-search{margin-left:8px;max-width:none;}
    /* controls stay >=40px tall for reliable touch targets */
    .top .om-btn{padding:11px 14px;min-height:40px;} .top .om-input{padding-top:11px;padding-bottom:11px;min-height:40px;}
    /* the derivation panel becomes a scrollable bottom sheet; the path bar and
       legend crowd the sheet, so they step aside on small screens */
    .om-panel{top:auto;left:0;right:0;bottom:0;width:auto;max-height:55vh;
      border-radius:16px 16px 0 0;box-shadow:0 -12px 36px rgba(22,24,29,.20);padding:18px;}
    /* body-scoped so these win over the base .legend/.pathbar rules that follow
       later in source order at equal (class) specificity */
    body .legend{display:none;}
    body .pathbar{left:8px;right:8px;transform:none;justify-content:center;bottom:12px;}
  }
  @media (prefers-reduced-motion: reduce){ *{transition-duration:.001ms !important;} .edge.flow{animation:none !important;} }
  /* warm-paper canvas + dotted grid, the map's language (trace keeps its own
     30px pitch rhythm). */
  #cy{position:fixed;top:58px;left:0;right:0;bottom:0;
      background:radial-gradient(circle at 1px 1px,#e6e3dd 1px,transparent 0) -1px -1px/30px 30px,
                 linear-gradient(180deg,#fdfcfa,#f6f4f0);}
  svg{width:100%;height:100%;display:block;cursor:grab;touch-action:none;} svg.drag{cursor:grabbing;}

  /* edges: warm-gray at rest; upstream amber, downstream indigo when lit */
  .edge{fill:none;stroke:#d6d2cb;stroke-width:1.3;stroke-linecap:round;transition:stroke .25s,opacity .25s,stroke-width .25s;}
  .edge.up{stroke:var(--up);stroke-width:2;opacity:.95;}
  .edge.down{stroke:var(--down);stroke-width:2;opacity:.95;}
  .edge.flow{stroke-dasharray:5 7;animation:flow 1s linear infinite;}
  @keyframes flow{to{stroke-dashoffset:-24;}}

  /* nodes: at rest, the map's slate hidden card; destinations get an indigo
     outline; lit upstream amber, lit downstream indigo, selected ink. */
  .node{cursor:pointer;}
  .node rect{fill:#eef1f6;stroke:#c4cddd;stroke-width:1.3;filter:drop-shadow(0 1px 3px rgba(22,24,29,.06));transition:stroke .2s,fill .2s,filter .2s;}
  /* Symbols live in an HTML overlay synced to the viewBox (foreignObject
     mis-positions under viewBox transforms in WebKit). */
  #labels{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  #labelsInner{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;}
  .nlab{position:absolute;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;color:#334155;transition:color .2s;pointer-events:none;}
  .node.dest rect{fill:#eef2ff;stroke:var(--obs);} .nlab.dest{color:var(--obs2);}
  .node.dim rect{opacity:.4;} .nlab.dim{opacity:.4;}
  .node.up rect{fill:#fdf2e3;stroke:var(--up);stroke-width:2;filter:drop-shadow(0 2px 8px rgba(217,138,20,.22));}
  .nlab.up{color:#a9690f;}
  .node.down rect{fill:var(--down);stroke:var(--obs2);stroke-width:2;filter:drop-shadow(0 2px 8px rgba(79,70,229,.28));}
  .nlab.down{color:#fff;}
  .node.sel rect{fill:#fff;stroke:#0b1220;stroke-width:2.6;filter:drop-shadow(0 6px 16px rgba(22,24,29,.24));}
  .nlab.sel{color:#0b1220;}
  #measure{position:absolute;left:-9999px;top:-9999px;font-size:18px;visibility:hidden;}

  /* derivation panel: the shared .om-panel floating surface; placement +
     content styles are page-specific. */
  .om-panel{position:fixed;top:72px;right:16px;width:392px;max-height:calc(100vh - 92px);overflow:auto;z-index:8;display:none;}
  .om-panel .x{float:right;cursor:pointer;color:#cbd5e1;font-size:1.6rem;line-height:1;padding:2px 8px;margin:-4px -6px 0 0;transition:.12s;} .om-panel .x:hover,.om-panel .x:active{color:var(--muted);}
  .om-panel .sym{font-size:1.7rem;color:#312e81;}
  .om-panel .badge{display:inline-block;font-size:.56rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;border-radius:999px;padding:3px 9px;margin-left:10px;vertical-align:middle;}
  .om-panel .badge.observable{background:var(--obs);} .om-panel .badge.hidden{background:#94a3b8;} .om-panel .badge.parameter{background:#64748b;}
  .om-panel .name{font-family:var(--font-mono);font-feature-settings:"zero" 1;color:var(--muted);font-size:.74rem;margin:.5em 0 .2em;word-break:break-word;}
  .lab{font-family:'Inter',sans-serif;font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .lab .dot{width:8px;height:8px;border-radius:50%;}
  .lab .dot.u{background:var(--up);} .lab .dot.d{background:var(--down);}
  .step{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--line);}
  .step:first-of-type{border-top:none;}
  .step .n{flex:0 0 22px;height:22px;border-radius:6px;background:#f4f2ee;border:1px solid var(--line);color:var(--muted);font:700 .72rem 'JetBrains Mono',monospace;font-feature-settings:"zero" 1;display:flex;align-items:center;justify-content:center;margin-top:2px;}
  .step .body{flex:1;min-width:0;}
  .step .rel{font-size:.95rem;color:var(--ink);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .step .op{font:600 .66rem 'Inter';color:var(--muted);background:#f4f2ee;border:1px solid var(--line);border-radius:6px;padding:2px 7px;letter-spacing:.02em;}
  .step .fx{margin-top:6px;font-size:.82rem;color:var(--ink2);overflow-x:auto;}
  .arrow{color:var(--faint);}
  .empty{color:var(--faint);font-size:.82rem;font-style:italic;padding:4px 0;}
  .summary{font-size:.82rem;color:var(--ink2);background:#f4f2ee;border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-top:4px;line-height:1.5;}
  .summary b{color:var(--ink);}
  .pathbar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:none;align-items:center;gap:10px;
    background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:14px;padding:9px 14px;
    box-shadow:0 12px 40px rgba(22,24,29,.12);z-index:9;font-size:.85rem;color:var(--ink2);}
  .pathbar .ep{font-size:1.05rem;color:#312e81;background:#eef2ff;border:1px solid #e0e4fb;border-radius:9px;padding:3px 10px;}
  .pathbar .clear{cursor:pointer;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:4px 9px;font-size:.76rem;font-weight:600;}
  .pathbar .clear:hover,.pathbar .clear:active{color:var(--ink);border-color:var(--obs);}
  .rest-hint{position:fixed;left:50%;top:54%;transform:translate(-50%,-50%);text-align:center;color:var(--faint);z-index:2;pointer-events:none;transition:opacity .4s;}
  .rest-hint .big{font-family:var(--font-serif);font-size:1.5rem;color:var(--ink);font-weight:700;letter-spacing:-.01em;margin-bottom:6px;}
  .legend{position:fixed;left:16px;bottom:16px;z-index:5;display:flex;gap:14px;align-items:center;
    background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:12px;padding:8px 13px;font-size:.76rem;color:var(--muted);box-shadow:0 4px 18px rgba(22,24,29,.06);}
  .legend span{display:inline-flex;align-items:center;gap:6px;} .legend i{width:11px;height:11px;border-radius:3px;display:inline-block;}
</style>
</head>
<body>
<div id="err"></div>
<div class="top">
  <a class="brand" href="../index.html" aria-label="openmaterials home">
    <span>openmaterials.ai</span><span class="om-dot" aria-hidden="true"></span>
  </a>
  <span class="sub">derivation tracer</span>
  <span class="om-search"><svg class="om-search-ic" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg><input class="om-input" id="q" placeholder="Find a quantity" aria-label="Find a quantity to trace"></span>
  <nav class="nav" aria-label="Primary">
    <a href="../map/">Map</a>
    <a href="../learn/">Learn</a>
    <a href="../openmaterials.pdf">Document</a>
    <a href="https://github.com/gbarbalinardo/openmaterials" target="_blank" rel="noopener">Source</a>
  </nav>
  <span class="controls">
    <span class="hint"><span><kbd>click</kbd> trace lineage</span><span><kbd>shift</kbd>+click path A&rarr;B</span></span>
    <button class="om-btn om-btn-sm" onclick="resetAll()" aria-label="Reset the trace">Reset</button>
  </span>
</div>
<div id="cy"><svg id="svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="arrU" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#d98a14"></path></marker>
    <marker id="arrD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4f46e5"></path></marker>
  </defs>
  <g id="vp"></g>
</svg><div id="labels" aria-hidden="true"><div id="labelsInner"></div></div></div>
<div id="measure"></div>
<div class="rest-hint" id="resthint"><div class="big">Trace a derivation</div>Click any quantity to light up how it is built and where it flows.</div>
<div class="legend">
  <span><i style="background:var(--up)"></i>how it's built (upstream)</span>
  <span><i style="background:var(--down)"></i>where it flows (downstream)</span>
  <span><i style="background:var(--obs);"></i>observable</span>
</div>
<div class="pathbar" id="pathbar"></div>
<div class="om-panel" id="panel"></div>

<script>window.onerror=function(m){var e=document.getElementById('err');e.style.display='block';e.textContent='Error: '+m;};</script>
<script src="../assets/vendor/dagre.min.js"></script>
<script src="../assets/vendor/katex/dist/katex.min.js"></script>
<script>
const svg=document.getElementById('svg'), vp=document.getElementById('vp'), measure=document.getElementById('measure');
let VB={x:0,y:0,w:1000,h:1000}, GW=1000, GH=1000;
let nodeById={}, parents={}, children={}, pos={}, symHtml={}, opByEdge={}, byVar={};
function setVB(){ svg.setAttribute('viewBox', VB.x+' '+VB.y+' '+VB.w+' '+VB.h); syncLabels(); }
function syncLabels(){
  const inner=document.getElementById('labelsInner'); if(!inner) return;
  const r=svg.getBoundingClientRect(); if(!r.width||!r.height||!VB.w||!VB.h) return;
  const sc=Math.min(r.width/VB.w, r.height/VB.h);
  inner.style.transform='translate('+((r.width-VB.w*sc)/2-VB.x*sc)+'px,'+((r.height-VB.h*sc)/2-VB.y*sc)+'px) scale('+sc+')';
}
window.addEventListener('resize', syncLabels);
let labelById={};
function tex(latex,display){ try{ return katex.renderToString(latex,{throwOnError:false,displayMode:!!display}); }catch(e){ return '<code>'+latex+'</code>'; } }
function smooth(pts){ if(!pts||pts.length<2) return ''; if(pts.length===2) return 'M'+pts[0].x+' '+pts[0].y+' L'+pts[1].x+' '+pts[1].y; let d='M'+pts[0].x+' '+pts[0].y; for(let i=1;i<pts.length-1;i++){ const mx=(pts[i].x+pts[i+1].x)/2, my=(pts[i].y+pts[i+1].y)/2; d+=' Q'+pts[i].x+' '+pts[i].y+' '+mx+' '+my; } d+=' L'+pts[pts.length-1].x+' '+pts[pts.length-1].y; return d; }
function err(m){ var e=document.getElementById('err'); e.style.display='block'; e.textContent='Error: '+m; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

if(typeof dagre==='undefined'){ err('dagre failed to load (no internet?)'); }
else Promise.all([
  fetch('../data/graph.json?v='+Date.now()).then(r=>r.json()),
  fetch('../data/instances.json?v='+Date.now()).then(r=>r.json()).catch(()=>[])
]).then(build).catch(e=> err('data: '+e));

function build([graph, insts]){
  insts.forEach(it=>{ (byVar[it.variable]=byVar[it.variable]||[]).push(it); });
  graph.nodes.forEach(n=>{ nodeById[n.id]=n; symHtml[n.id]=tex(n.symbol); });
  const seen=new Set(), edges=[];
  graph.links.forEach(l=>{ const k=l.source+'>>'+l.target; if(!seen.has(k)&&l.source!==l.target){ seen.add(k); edges.push(l); opByEdge[k]=l.op||''; (children[l.source]=children[l.source]||[]).push(l.target); (parents[l.target]=parents[l.target]||[]).push(l.source); } });

  graph.nodes.forEach(n=>{ measure.innerHTML=symHtml[n.id]; n._w=Math.max(46, measure.offsetWidth+24); n._h=Math.max(36, measure.offsetHeight+16); });
  const g=new dagre.graphlib.Graph(); g.setGraph({rankdir:'TB',nodesep:16,ranksep:104,marginx:30,marginy:34}); g.setDefaultEdgeLabel(()=>({}));
  graph.nodes.forEach(n=> g.setNode(n.id,{width:n._w,height:n._h}));
  edges.forEach(e=> g.setEdge(e.source,e.target));
  dagre.layout(g);
  GW=g.graph().width; GH=g.graph().height;

  let s='', lhtml='';
  edges.forEach(e=>{ const ed=g.edge({v:e.source,w:e.target}); if(!ed)return; s+='<path class="edge" data-edge="'+e.source+'>>'+e.target+'" d="'+smooth(ed.points)+'"></path>'; });
  graph.nodes.forEach(n=>{ const p=g.node(n.id); pos[n.id]={x:p.x,y:p.y,w:p.width,h:p.height}; const x=p.x-p.width/2, y=p.y-p.height/2; const dest=(n.type==='observable' && (children[n.id]||[]).length===0)?' dest':'';
    s+='<g class="node'+dest+'" data-id="'+esc(n.id)+'"><rect x="'+x+'" y="'+y+'" width="'+p.width+'" height="'+p.height+'" rx="11"></rect></g>';
    lhtml+='<div class="nlab'+dest+'" data-id="'+esc(n.id)+'" style="left:'+x+'px;top:'+y+'px;width:'+p.width+'px;height:'+p.height+'px">'+symHtml[n.id]+'</div>'; });
  vp.innerHTML=s;
  const inner=document.getElementById('labelsInner');
  inner.innerHTML=lhtml;
  labelById={};
  inner.querySelectorAll('.nlab').forEach(l=>{ labelById[l.dataset.id]=l; });
  if(!window.__labelMirror){
    const MIRROR=['dim','up','down','sel'];
    window.__labelMirror=new MutationObserver(muts=>{
      muts.forEach(m=>{
        const el=m.target;
        if(!el.classList||!el.classList.contains('node')||!el.dataset.id) return;
        const lab=labelById[el.dataset.id]; if(!lab) return;
        MIRROR.forEach(c=> lab.classList.toggle(c, el.classList.contains(c)));
      });
    });
    window.__labelMirror.observe(vp,{attributes:true,subtree:true,attributeFilter:['class']});
  }
  syncLabels();
  fitAll();
}
function fitAll(){ VB={x:0,y:0,w:GW,h:GH}; setVB(); }
function fitTo(ids){ let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9; ids.forEach(id=>{const q=pos[id]; if(!q)return; x0=Math.min(x0,q.x-q.w/2); y0=Math.min(y0,q.y-q.h/2); x1=Math.max(x1,q.x+q.w/2); y1=Math.max(y1,q.y+q.h/2);}); if(x1<x0)return; const pad=120; VB={x:x0-pad,y:y0-pad,w:(x1-x0)+2*pad,h:(y1-y0)+2*pad}; setVB(); }

// ---- graph reachability ----
function reach(id, adj){ const out=new Set(), dq=[id]; while(dq.length){ const x=dq.pop(); (adj[x]||[]).forEach(y=>{ if(!out.has(y)){ out.add(y); dq.push(y);} }); } return out; }
function pathBetween(a,b){ // directed a->...->b over children; fall back b->a
  function bfs(src,dst){ const prev={}, dq=[src], seen=new Set([src]); while(dq.length){ const x=dq.shift(); if(x===dst){ const p=[dst]; let c=dst; while(c!==src){ c=prev[c]; p.unshift(c);} return p; } (children[x]||[]).forEach(y=>{ if(!seen.has(y)){ seen.add(y); prev[y]=x; dq.push(y);} }); } return null; }
  return bfs(a,b) || (bfs(b,a)||[]).slice().reverse();
}

// ---- visual application ----
function clearClasses(){ vp.querySelectorAll('.node').forEach(el=>el.classList.remove('dim','up','down','sel')); vp.querySelectorAll('.edge').forEach(el=>{el.classList.remove('up','down','flow');el.removeAttribute('marker-end');}); }
function dimAllExcept(keep){ vp.querySelectorAll('.node').forEach(el=> el.classList.toggle('dim', !keep.has(el.dataset.id))); }
function paintEdge(s,t,kind){ const el=vp.querySelector('.edge[data-edge="'+cssesc(s+'>>'+t)+'"]'); if(el){ el.classList.add(kind,'flow'); el.setAttribute('marker-end', kind==='up'?'url(#arrU)':'url(#arrD)'); } }
function cssesc(s){ return (window.CSS&&CSS.escape)?CSS.escape(s):s.replace(/["\\\]]/g,'\\$&'); }

function trace(id){
  document.getElementById('resthint').style.opacity=0;
  pathMode=null; document.getElementById('pathbar').style.display='none';
  clearClasses();
  const anc=reach(id,parents), desc=reach(id,children);
  const keep=new Set([id, ...anc, ...desc]);
  dimAllExcept(keep);
  vp.querySelector('.node[data-id="'+cssesc(id)+'"]').classList.add('sel');
  anc.forEach(a=> vp.querySelector('.node[data-id="'+cssesc(a)+'"]')?.classList.add('up'));
  desc.forEach(d=> vp.querySelector('.node[data-id="'+cssesc(d)+'"]')?.classList.add('down'));
  // edges: upstream subgraph (both in anc∪id), downstream (both in desc∪id)
  const up=new Set([id,...anc]), dn=new Set([id,...desc]);
  Object.keys(opByEdge).forEach(k=>{ const [s,t]=k.split('>>'); if(up.has(s)&&up.has(t)) paintEdge(s,t,'up'); else if(dn.has(s)&&dn.has(t)) paintEdge(s,t,'down'); });
  derivationPanel(id, anc, desc);
  fitTo([...keep]);
}

function stepHtml(s,t,i,kind){
  const op=opByEdge[s+'>>'+t]||''; const f=nodeById[t]&&nodeById[t].formula;
  return '<div class="step"><div class="n">'+i+'</div><div class="body"><div class="rel">'+symHtml[s]+' <span class="arrow">&rarr;</span> '+symHtml[t]+(op?' <span class="op">'+esc(op)+'</span>':'')+'</div>'+(f?'<div class="fx">'+tex(f,false)+'</div>':'')+'</div></div>';
}
function orderedEdges(nodeSet){ // edges fully inside nodeSet, ordered by target layer
  const es=[]; Object.keys(opByEdge).forEach(k=>{ const [s,t]=k.split('>>'); if(nodeSet.has(s)&&nodeSet.has(t)) es.push([s,t]); });
  es.sort((a,b)=> (nodeById[a[1]].layer||0)-(nodeById[b[1]].layer||0)); return es;
}
function derivationPanel(id, anc, desc){
  const node=nodeById[id];
  const up=orderedEdges(new Set([id,...anc])), dn=orderedEdges(new Set([id,...desc]));
  const dests=[...desc].filter(d=> nodeById[d].type==='observable' && (children[d]||[]).length===0);
  let h='<span class="x" onclick="resetAll()">×</span>';
  h+='<div><span class="sym">'+tex(node.symbol)+'</span><span class="badge '+node.type+'">'+node.type+'</span></div><div class="name">'+esc(node.id)+'</div>';
  h+='<div class="summary">'+(anc.size?('Built from <b>'+anc.size+'</b> upstream quantit'+(anc.size>1?'ies':'y')):'A <b>source</b> quantity')+'. '+(desc.size?('Flows into <b>'+desc.size+'</b> downstream'+(dests.length?(', reaching '+dests.map(d=>tex(nodeById[d].symbol)).join(' ')):'')):'A terminal observable')+'.</div>';
  h+='<div class="lab"><span class="dot u"></span>how it is built</div>';
  h+= up.length? up.map((e,i)=>stepHtml(e[0],e[1],i+1,'up')).join('') : '<div class="empty">nothing upstream: this is a source.</div>';
  h+='<div class="lab"><span class="dot d"></span>where it flows</div>';
  h+= dn.length? dn.map((e,i)=>stepHtml(e[0],e[1],i+1,'down')).join('') : '<div class="empty">nothing downstream: this is a terminal observable.</div>';
  const p=document.getElementById('panel'); p.innerHTML=h; p.style.display='block';
}

// ---- pick-two path mode ----
let pathMode=null; // {a}
function startPath(a){ pathMode={a}; const pb=document.getElementById('pathbar'); pb.style.display='flex'; pb.innerHTML='<span>path from</span><span class="ep">'+symHtml[a]+'</span><span style="color:#5b6b86">→ shift-click a target…</span><span class="clear" onclick="resetAll()">cancel</span>'; }
function finishPath(a,b){
  const path=pathBetween(a,b);
  document.getElementById('resthint').style.opacity=0;
  clearClasses();
  if(!path||!path.length){ const pb=document.getElementById('pathbar'); pb.innerHTML='<span>no directed path between</span><span class="ep">'+symHtml[a]+'</span><span class="ep">'+symHtml[b]+'</span><span class="clear" onclick="resetAll()">clear</span>'; pathMode=null; return; }
  const keep=new Set(path); dimAllExcept(keep);
  path.forEach((n,i)=>{ const el=vp.querySelector('.node[data-id="'+cssesc(n)+'"]'); if(el) el.classList.add(i===0?'up':(i===path.length-1?'sel':'down')); });
  for(let i=0;i<path.length-1;i++){ if(opByEdge[path[i]+'>>'+path[i+1]]!==undefined) paintEdge(path[i],path[i+1],'down'); else paintEdge(path[i+1],path[i],'up'); }
  // panel: the linear chain
  let h='<span class="x" onclick="resetAll()">×</span><div class="lab"><span class="dot d"></span>derivation path</div>';
  h+='<div class="summary"><b>'+(path.length-1)+'</b> steps from '+tex(nodeById[a].symbol)+' to '+tex(nodeById[b].symbol)+'.</div>';
  for(let i=0;i<path.length-1;i++){ const fwd=opByEdge[path[i]+'>>'+path[i+1]]!==undefined; h+= fwd? stepHtml(path[i],path[i+1],i+1,'down') : stepHtml(path[i+1],path[i],i+1,'up'); }
  const p=document.getElementById('panel'); p.innerHTML=h; p.style.display='block';
  const pb=document.getElementById('pathbar'); pb.innerHTML='<span class="ep">'+symHtml[a]+'</span><span style="color:#5b6b86">→</span><span class="ep">'+symHtml[b]+'</span><span class="clear" onclick="resetAll()">clear</span>';
  fitTo(path); pathMode=null;
}

function resetAll(){ clearClasses(); document.getElementById('panel').style.display='none'; document.getElementById('pathbar').style.display='none'; document.getElementById('resthint').style.opacity=1; pathMode=null; }

// ---- pan / zoom / click ----
let dragging=false, moved=false, sx=0, sy=0, vbs=null;
svg.addEventListener('mousedown', e=>{ dragging=true; moved=false; sx=e.clientX; sy=e.clientY; vbs={x:VB.x,y:VB.y}; svg.classList.add('drag'); });
window.addEventListener('mouseup', ()=>{ dragging=false; svg.classList.remove('drag'); });
window.addEventListener('mousemove', e=>{ if(!dragging)return; const m=svg.getScreenCTM(); if(!m)return; const dx=(e.clientX-sx)/m.a, dy=(e.clientY-sy)/m.d; if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4) moved=true; VB.x=vbs.x-dx; VB.y=vbs.y-dy; setVB(); });
svg.addEventListener('wheel', e=>{ e.preventDefault(); const m=svg.getScreenCTM(); if(!m)return; const pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY; const u=pt.matrixTransform(m.inverse()); const f=e.deltaY>0?1.12:0.893; VB.x=u.x-(u.x-VB.x)*f; VB.y=u.y-(u.y-VB.y)*f; VB.w*=f; VB.h*=f; setVB(); }, {passive:false});

// ---- touch: single-finger pan, two-finger pinch, tap = trace ---------------
// Independent of the mouse path (desktop unchanged). A client point maps to
// SVG-user space by inverting the preserveAspectRatio="xMidYMid meet" fit (the
// same math syncLabels uses), so every viewport change routes through VB+setVB
// and the HTML label overlay stays in sync. A tap under a small movement
// threshold traces the touched node (touch has no shift for the path mode).
function clientToUser(cx,cy){
  const r=svg.getBoundingClientRect();
  const sc=Math.min(r.width/VB.w, r.height/VB.h) || 1;
  const ox=(r.width-VB.w*sc)/2, oy=(r.height-VB.h*sc)/2;
  return { x:(cx-r.left-ox)/sc + VB.x, y:(cy-r.top-oy)/sc + VB.y };
}
let tPan=null, tPinch=null, tMoved=false, tStart=null;
function touchMid(t){ return { x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2 }; }
function touchDist(t){ const dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.hypot(dx,dy); }
svg.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    tPinch=null; tMoved=false;
    const t=e.touches[0]; tStart={x:t.clientX,y:t.clientY,target:e.target};
    tPan={x:t.clientX,y:t.clientY,vbx:VB.x,vby:VB.y};
  } else if(e.touches.length===2){
    e.preventDefault(); tPan=null; tMoved=true;
    tPinch={dist:touchDist(e.touches)||1,vb:{x:VB.x,y:VB.y,w:VB.w,h:VB.h}};
  }
}, {passive:false});
svg.addEventListener('touchmove', e=>{
  if(tPinch && e.touches.length>=2){
    e.preventDefault();
    const mid=touchMid(e.touches);
    VB=tPinch.vb;
    const u=clientToUser(mid.x,mid.y);
    const f=tPinch.dist/(touchDist(e.touches)||1);
    VB={ x:u.x-(u.x-tPinch.vb.x)*f, y:u.y-(u.y-tPinch.vb.y)*f, w:tPinch.vb.w*f, h:tPinch.vb.h*f };
    setVB();
  } else if(tPan && e.touches.length===1){
    const t=e.touches[0];
    if(Math.abs(t.clientX-tPan.x)+Math.abs(t.clientY-tPan.y)>6) tMoved=true;
    if(!tMoved) return;
    e.preventDefault();
    const r=svg.getBoundingClientRect();
    const sc=Math.min(r.width/VB.w, r.height/VB.h) || 1;
    VB.x=tPan.vbx-(t.clientX-tPan.x)/sc; VB.y=tPan.vby-(t.clientY-tPan.y)/sc; setVB();
  }
}, {passive:false});
svg.addEventListener('touchend', e=>{
  if(e.touches.length===0){
    if(tPan && !tMoved && tStart){
      const nd=tStart.target.closest && tStart.target.closest('.node');
      if(nd){ trace(nd.dataset.id); } else { resetAll(); }
    }
    tPan=null; tPinch=null; tStart=null;
  }
}, {passive:false});
svg.addEventListener('click', e=>{ if(moved)return; const nd=e.target.closest('.node'); if(!nd){ resetAll(); return; } const id=nd.dataset.id;
  if(e.shiftKey){ if(pathMode&&pathMode.a&&pathMode.a!==id){ finishPath(pathMode.a,id); } else { startPath(id); } return; }
  trace(id);
});
window.navTo=function(id){ if(nodeById[id]) trace(id); };
document.getElementById('q').addEventListener('input', function(){
  const v=this.value.trim().toLowerCase(); if(!v){ resetAll(); return; }
  const hits=Object.values(nodeById).filter(n=> (n.id+' '+n.symbol).toLowerCase().includes(v)).map(n=>n.id);
  if(hits.length===1){ trace(hits[0]); return; }
  const set=new Set(hits); document.getElementById('resthint').style.opacity=0; clearClasses();
  dimAllExcept(set); hits.forEach(h=> vp.querySelector('.node[data-id="'+cssesc(h)+'"]')?.classList.add('sel'));
  document.getElementById('panel').style.display='none';
  if(hits.length) fitTo(hits);
});
</script>
</body>
</html>
