# Test gate: a fresh clone must install and pass the suite. API-key-gated
# tests (the live golden parser run) skip themselves when no key is present,
# so this stays green without secrets. Lint (ruff) is not wired yet: the
# configured rules currently report existing violations repo-wide; add a
# `ruff check .` step once that cleanup lands.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -q

  # The distance layer needs its optional extras; without them tests/distance
  # skips itself, so the base matrix above stays lean.
  distance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,distance,amd]"
      - name: Test
        run: pytest tests/distance -q
